# Nginx config for smelitehajj.com
# Place this file at: /etc/nginx/sites-available/smelitehajj.conf

server {
    listen 80;
    server_name smelitehajj.com www.smelitehajj.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smelitehajj.com www.smelitehajj.com;

    # SSL (will be set up by certbot)
    ssl_certificate /etc/letsencrypt/live/smelitehajj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smelitehajj.com/privkey.pem;

    # Frontend (React build)
    root /var/www/smelitehajj/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Backend API proxy (port 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/smelitehajj/backend/uploads/;
        expires 30d;
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
